# cargo-audit advisory suppressions.
# Re-evaluate each entry when the upstream constraint is resolved.

[advisories]
ignore = [
    # RUSTSEC-2026-0097 — rand 0.8.5 unsound with custom logger using rand::rng()
    # Chain: ratatui -> ratatui-termwiz (optional) -> termwiz -> phf 0.11 ->
    #   phf_generator 0.11.3 -> rand 0.8.5
    # ratatui-termwiz is an optional ratatui backend that is NOT enabled or
    # compiled in this project. `cargo tree` confirms rand 0.8.5 is absent from
    # the binary. Blocked on termwiz upgrading to phf 0.13 (which replaces rand
    # with fastrand). Revisit when termwiz 0.24+ releases.
    "RUSTSEC-2026-0097",

    # RUSTSEC-2025-0141 — bincode 1.3.3 unmaintained
    # Pulled in by syntect 5.3.0 (latest). syntect has not migrated to bincode 2.
    # No fix available without switching syntax-highlighting libraries.
    # Revisit when syntect 6+ releases.
    "RUSTSEC-2025-0141",

    # RUSTSEC-2024-0320 — yaml-rust 0.4.5 unmaintained
    # Pulled in by syntect 5.3.0 via the yaml-load feature for .sublime-syntax
    # file parsing. No maintained fork adopted by syntect yet.
    # Revisit when syntect 6+ releases.
    "RUSTSEC-2024-0320",
]
