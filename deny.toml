# forgiven — cargo-deny configuration
# Docs: https://embarkstudios.github.io/cargo-deny/
# Run:  cargo deny check
# Install: cargo install cargo-deny --locked

# ── Advisories ─────────────────────────────────────────────────────────────────
# Check the RustSec advisory database for known CVEs, unsound issues, etc.
[advisories]
# Path to a local copy of the advisory database.  If absent, cargo-deny fetches
# it automatically from https://github.com/rustsec/advisory-db.
db-path = "~/.cargo/advisory-db"
db-urls  = ["https://github.com/rustsec/advisory-db"]

# Fail the build if a VULNERABILITY is found.
vulnerability = "deny"

# Warn (not fail) for unmaintained crates — good signal but not always blocking.
unmaintained = "workspace"

# Warn on yanked versions of crates.
yanked = "warn"

# Notice-level advisories are informational.
notice = "warn"

# ── Licences ───────────────────────────────────────────────────────────────────
# All dependency licences must appear in the allow list.
[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "CC0-1.0",              # notify, some C headers
    "Unicode-DFS-2016",     # unicode-data tables
    "Unicode-3.0",
    "Zlib",
    "OpenSSL",
]

# Confidence threshold — a score below this treats the detected licence as
# unknown.  0.8 is a safe default; raise to 0.9 if you want stricter checks.
confidence-threshold = 0.8

# If a crate is detected as having no licence at all, deny it.
unlicensed = "deny"

# ── Bans ───────────────────────────────────────────────────────────────────────
# Prevent crates with known issues or policy violations.
[bans]
# Warn if two different versions of the same crate are pulled in.
# "warn" is softer than "deny" — useful while a dependency tree is still maturing.
multiple-versions = "warn"

# Allow wildcards in dependencies (Cargo.toml uses explicit version reqs).
wildcards = "allow"

# List of crates we never want in the dependency graph.
deny = [
    # Old, unsound unmaintained crypto crates.
    { name = "openssl",   reason = "Use rustls instead of the openssl C binding" },
    # Deprecated spin-based mutex (replaced by parking_lot or std::sync::Mutex).
    { name = "spin",      reason = "Prefer std or parking_lot synchronisation" },
]

# ── Sources ────────────────────────────────────────────────────────────────────
# Only allow crates published to crates.io (no git deps, no private registries).
[sources]
unknown-registry = "deny"
unknown-git      = "deny"
allow-registry   = ["https://github.com/rust-lang/crates.io-index"]
