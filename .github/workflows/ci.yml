name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

# Cancel any in-flight run for the same branch when a new push arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Formatting + Clippy ──────────────────────────────────────────────────
  lint:
    name: Lint (fmt + clippy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable + components)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry / build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny all warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── 2. CVE / advisory scan ──────────────────────────────────────────────────
  audit:
    name: Security audit (cargo-audit)
    runs-on: ubuntu-latest
    permissions:
      checks: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run cargo-audit
        uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Licence + banned-crate check ────────────────────────────────────────
  deny:
    name: Cargo deny (licences + advisories)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # deny.toml at the repo root is picked up automatically.
          arguments: --all-features

  # ── 4. Build + test ─────────────────────────────────────────────────────────
  build:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false          # report both platforms even if one fails
      matrix:
        os: [macos-latest, ubuntu-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry / build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      # arboard (system clipboard) needs X11/XCB dev headers on Linux.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            libxcb1-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            xvfb

      - name: Build (release)
        run: cargo build --release

      - name: Run tests (Linux — Xvfb virtual display for clipboard)
        if: runner.os == 'Linux'
        run: xvfb-run -a cargo test --all

      - name: Run tests (macOS)
        if: runner.os != 'Linux'
        run: cargo test --all

      - name: Upload release binary (macOS only)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: forgiven-macos
          path: target/release/forgiven
          retention-days: 7
