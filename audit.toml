# forgiven — cargo-audit configuration
# Docs: https://docs.rs/cargo-audit
# Used by: rustsec/audit-check@v2 in CI and local `cargo audit` runs.
#
# Ignored advisories must be reviewed on each dependency update.
# To check current status: cargo audit

[advisories]
ignore = [
    # bincode 1.3.3 is unmaintained (RUSTSEC-2025-0141).
    # Pulled in transitively by syntect 5.x which uses it for theme/syntax
    # cache serialisation.  syntect has no available update that drops bincode.
    # Not a vulnerability — no CVE, no known exploit.  Revisit if syntect 6
    # is released without the bincode dependency.
    "RUSTSEC-2025-0141",

    # instant 0.1.13 is unmaintained (RUSTSEC-2024-0384).
    # Pulled in transitively by notify-types 1.0.1 → notify 7.0.0.
    # No stable upgrade of notify 7 is available that removes instant.
    # Not a vulnerability — no CVE, no known exploit.  Revisit when notify
    # 8 or 9 reaches stable and we can update our dependency.
    "RUSTSEC-2024-0384",
]
