# forgiven — rustfmt configuration
# Run:  cargo fmt --all
# Check: cargo fmt --all -- --check

edition = "2021"

# Line width — 100 is readable without wrapping on modern monitors.
max_width = 100

# Use the "Max" heuristic so ratatui widget chains don't get oddly split.
use_small_heuristics = "Max"

# Group std / external / crate imports into separate blocks.
imports_granularity = "Crate"
group_imports       = "StdExternalCrate"

# Trailing commas in function calls / definitions help diffs stay clean.
trailing_comma = "Vertical"

# Always put a newline before `{` in match arms with blocks.
match_block_trailing_comma = true

# Normalise string literals (e.g. collapse `\"` inside strings).
normalize_doc_attributes = true

# Force single blank line between items (consistent spacing).
blank_lines_upper_bound = 1
